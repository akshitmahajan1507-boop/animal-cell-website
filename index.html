<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Cell</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg0:#02030d;--accent:#5efce8;--accent2:#fc5ef6;--accent3:#ffd85e;
  --text:#dde4ff;--dim:#4a5070;--panel:rgba(6,10,28,0.9);
}
body{background:var(--bg0);font-family:'Syne',sans-serif;color:var(--text);overflow:hidden;width:100vw;height:100vh;cursor:none;}

/* ── Cursor ── */
#cursor{position:fixed;width:10px;height:10px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;box-shadow:0 0 14px var(--accent),0 0 35px rgba(94,252,232,0.25);}
#cursorRing{position:fixed;width:32px;height:32px;border:1px solid rgba(94,252,232,0.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.1s ease-out;}

/* ── Background ── */
#bgCanvas{position:fixed;inset:0;z-index:0;}

/* ── Scanlines ── */
#scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:3;}

/* ── Particles ── */
#particles{position:fixed;inset:0;z-index:2;pointer-events:none;}

/* ── Veil ── */
#veil{position:fixed;inset:0;background:var(--bg0);opacity:0;pointer-events:none;z-index:500;transition:opacity 0.4s;}

/* ── Layout ── */
#app{position:relative;width:100vw;height:100vh;display:grid;grid-template-columns:1fr 420px;grid-template-rows:auto 1fr auto;z-index:1;}

/* ── Header ── */
#header{grid-column:1/-1;padding:20px 32px 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.04);padding-bottom:14px;}
#headerLeft{display:flex;flex-direction:column;gap:4px;}
#headerLeft h1{font-family:'Instrument Serif',serif;font-size:1.9rem;font-weight:400;font-style:italic;color:var(--accent);letter-spacing:0.5px;text-shadow:0 0 28px rgba(94,252,232,0.55),0 0 60px rgba(94,252,232,0.18);line-height:1;}
#headerLeft p{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--dim);letter-spacing:3px;text-transform:uppercase;}
#headerRight{display:flex;align-items:center;gap:14px;}
#stepCounter{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--dim);letter-spacing:2px;white-space:nowrap;}
#stepCounter span{color:var(--accent);font-weight:600;}

/* ── Control Buttons ── */
#controls{display:flex;align-items:center;gap:10px;}
.ctrl-btn{font-family:'Syne',sans-serif;font-size:0.68rem;font-weight:700;border:none;border-radius:100px;cursor:none;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;gap:6px;padding:9px 18px;white-space:nowrap;}

#backBtn{
  color:var(--accent);
  background:rgba(94,252,232,0.07);
  border:1px solid rgba(94,252,232,0.2);
}
#backBtn:hover:not(:disabled){background:rgba(94,252,232,0.16);border-color:rgba(94,252,232,0.6);transform:scale(1.05);box-shadow:0 0 20px rgba(94,252,232,0.25);}
#backBtn:disabled{opacity:0.2;pointer-events:none;}
#backBtn svg{width:12px;height:12px;flex-shrink:0;}

#pauseBtn{
  width:42px;height:42px;padding:0;border-radius:50%;
  background:rgba(252,94,246,0.08);
  border:1px solid rgba(252,94,246,0.25);
  color:var(--accent2);font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
#pauseBtn::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(252,94,246,0.15),transparent 70%);opacity:0;transition:opacity 0.3s;}
#pauseBtn:hover::before{opacity:1;}
#pauseBtn:hover{border-color:var(--accent2);transform:scale(1.12);box-shadow:0 0 28px rgba(252,94,246,0.35);}
#pauseBtn.playing{border-color:rgba(252,94,246,0.5);box-shadow:0 0 18px rgba(252,94,246,0.22);}
#pauseBtn.playing::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid rgba(252,94,246,0.2);animation:ringPulse 2.2s ease-in-out infinite;}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.25);opacity:0;}}

#nextBtn{
  color:#02030d;
  background:linear-gradient(135deg,#5efce8,#38e8d8);
  box-shadow:0 0 20px rgba(94,252,232,0.38),inset 0 1px 0 rgba(255,255,255,0.25);
}
#nextBtn:hover{background:linear-gradient(135deg,#fff,#c8fef8);box-shadow:0 0 32px rgba(255,255,255,0.4);transform:scale(1.06);}
#nextBtn svg{width:12px;height:12px;flex-shrink:0;}

/* ── Paused Badge ── */
#pauseBadge{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.85);
  background:rgba(4,6,20,0.94);
  border:1px solid rgba(252,94,246,0.45);
  border-radius:18px;padding:16px 32px;
  font-family:'JetBrains Mono',monospace;font-size:0.78rem;letter-spacing:5px;color:var(--accent2);text-transform:uppercase;
  backdrop-filter:blur(24px);
  box-shadow:0 0 60px rgba(252,94,246,0.2),0 0 120px rgba(252,94,246,0.08);
  opacity:0;pointer-events:none;z-index:200;
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  display:flex;align-items:center;gap:10px;
}
#pauseBadge::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 10px var(--accent2);flex-shrink:0;}
#pauseBadge.visible{opacity:1;transform:translate(-50%,-50%) scale(1);}

/* ── Keyboard hints ── */
#keyHint{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;opacity:0;animation:hintFade 5s ease 1.5s forwards;}
@keyframes hintFade{0%{opacity:0;transform:translateX(-50%) translateY(8px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}75%{opacity:1;}100%{opacity:0;}}
.key-chip{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:4px 9px;letter-spacing:1.5px;}
.key-chip b{color:rgba(255,255,255,0.55);font-weight:400;}

/* ── Cell Stage ── */
#cellStage{grid-column:1;grid-row:2;position:relative;display:flex;align-items:center;justify-content:center;}
#cellCanvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);}

/* ── Info Panel ── */
#infoPanel{grid-column:2;grid-row:2;padding:18px 26px 18px 16px;display:flex;flex-direction:column;justify-content:center;gap:12px;overflow:hidden;}

#organelleCard{
  background:var(--panel);border:1px solid rgba(255,255,255,0.07);border-radius:22px;padding:24px 24px 20px;
  backdrop-filter:blur(24px);position:relative;overflow:hidden;
  transition:border-color 0.5s,transform 0.4s,opacity 0.4s;
  box-shadow:0 24px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06);
}
#organelleCard::after{content:'';position:absolute;inset:0;border-radius:22px;background:radial-gradient(ellipse at 15% 15%,rgba(94,252,232,0.04) 0%,transparent 65%);pointer-events:none;}
#cardAccentBar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:22px 22px 0 0;transition:background 0.5s;}
#cardAccentCorner{position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 22px 0 0;opacity:0.06;transition:background 0.5s;}

#cardHeader{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;}
#cardEmoji{font-size:2.6rem;flex-shrink:0;filter:drop-shadow(0 0 10px currentColor);animation:iconFloat 3.2s ease-in-out infinite;}
@keyframes iconFloat{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-5px) rotate(3deg);}}
#cardMeta{flex:1;min-width:0;}
#cardName{font-family:'Instrument Serif',serif;font-size:1.7rem;font-weight:400;font-style:italic;line-height:1.05;margin-bottom:5px;transition:color 0.5s;}
#cardTag{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:2.5px;text-transform:uppercase;opacity:0.5;line-height:1.4;}

#cardDivider{height:1px;background:rgba(255,255,255,0.06);margin-bottom:14px;}
#cardDesc{font-size:0.9rem;line-height:1.72;color:#aab5d8;font-weight:300;}

/* ── Fun Fact ── */
#funFact{
  background:rgba(94,252,232,0.04);border:1px solid rgba(94,252,232,0.1);
  border-radius:14px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;
  opacity:0;transform:translateY(10px);transition:all 0.5s 0.3s;
  position:relative;overflow:hidden;
}
#funFact::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:linear-gradient(180deg,var(--accent),var(--accent2));opacity:0.6;}
#funFact.visible{opacity:1;transform:translateY(0);}
.ffIcon{font-size:1rem;flex-shrink:0;margin-top:2px;}
.ffText{font-family:'JetBrains Mono',monospace;font-size:0.68rem;line-height:1.6;color:rgba(94,252,232,0.75);}

/* ── Mini thumbnail strip ── */
#thumbStrip{display:flex;gap:6px;padding:4px 0;overflow-x:auto;scrollbar-width:none;}
#thumbStrip::-webkit-scrollbar{display:none;}
.thumb{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:0.7rem;cursor:none;transition:all 0.25s;flex-shrink:0;background:rgba(255,255,255,0.04);}
.thumb:hover{transform:scale(1.2);border-color:rgba(255,255,255,0.35);}
.thumb.active{transform:scale(1.25);border-color:var(--accent);box-shadow:0 0 10px var(--accent);}
.thumb.visited{opacity:0.7;}

/* ── Footer ── */
#footer{grid-column:1/-1;padding:10px 32px 16px;display:flex;align-items:center;gap:16px;border-top:1px solid rgba(255,255,255,0.04);background:linear-gradient(0deg,rgba(2,3,13,0.5),transparent);}
#footerLabel{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
#timelineTrack{flex:1;height:3px;background:rgba(255,255,255,0.05);border-radius:3px;position:relative;overflow:visible;cursor:none;}
#timelineFill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;width:0%;transition:width 0.55s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 10px var(--accent);position:relative;}
#timelineFill::after{content:'';position:absolute;right:-4px;top:-4px;width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent),0 0 20px rgba(94,252,232,0.4);}
.tl-tick{position:absolute;top:50%;width:1px;height:10px;background:rgba(255,255,255,0.1);transform:translateY(-50%);transition:all 0.4s;cursor:none;}
.tl-tick.done{background:rgba(94,252,232,0.35);}
.tl-tick.active-tick{background:var(--accent);box-shadow:0 0 6px var(--accent);}
#timerArc{width:38px;height:38px;flex-shrink:0;}
#footerRight{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--dim);letter-spacing:1px;white-space:nowrap;flex-shrink:0;}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursorRing"></div>
<div id="veil"></div>
<canvas id="bgCanvas"></canvas>
<div id="scanline"></div>
<div id="particles"></div>
<div id="pauseBadge">PAUSED</div>
<div id="keyHint">
  <div class="key-chip"><b>←</b> BACK</div>
  <div class="key-chip"><b>SPACE</b> PAUSE</div>
  <div class="key-chip"><b>→</b> NEXT</div>
</div>

<div id="app">
  <div id="header">
    <div id="headerLeft">
      <h1>Animal Cell</h1>
      <p>Interactive Deep Dive · Biology</p>
    </div>
    <div id="headerRight">
      <div id="stepCounter">PART <span id="stepNum">01</span>&thinsp;/&thinsp;<span id="stepTotal">12</span></div>
      <div id="controls">
        <button id="backBtn" class="ctrl-btn" disabled>
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="8,2 4,6 8,10"/></svg>
          BACK
        </button>
        <button id="pauseBtn" class="ctrl-btn playing" title="Pause / Play">⏸</button>
        <button id="nextBtn" class="ctrl-btn">
          NEXT
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4,2 8,6 4,10"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="cellStage"><canvas id="cellCanvas"></canvas></div>

  <div id="infoPanel">
    <div id="organelleCard">
      <div id="cardAccentBar"></div>
      <div id="cardAccentCorner"></div>
      <div id="cardHeader">
        <span id="cardEmoji">🔬</span>
        <div id="cardMeta">
          <div id="cardName">Animal Cell</div>
          <div id="cardTag">The Basic Unit of Life</div>
        </div>
      </div>
      <div id="cardDivider"></div>
      <div id="cardDesc">Loading...</div>
    </div>
    <div id="funFact">
      <span class="ffIcon">💡</span>
      <span class="ffText">Loading...</span>
    </div>
    <div id="thumbStrip"></div>
  </div>

  <div id="footer">
    <svg id="timerArc" viewBox="0 0 38 38">
      <circle cx="19" cy="19" r="15" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2.5"/>
      <circle id="timerCircle" cx="19" cy="19" r="15" fill="none"
        stroke="url(#tg)" stroke-width="2.5"
        stroke-dasharray="94.25" stroke-dashoffset="94.25"
        stroke-linecap="round" transform="rotate(-90 19 19)"/>
      <defs>
        <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#5efce8"/>
          <stop offset="100%" stop-color="#fc5ef6"/>
        </linearGradient>
      </defs>
    </svg>
    <div id="footerLabel">PROGRESS</div>
    <div id="timelineTrack"><div id="timelineFill"></div></div>
    <div id="footerRight" id="timeLeft">9s</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CURSOR
// ═══════════════════════════════════════
const curDot=document.getElementById('cursor'), curRing=document.getElementById('cursorRing');
let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function ac(){curDot.style.cssText+=`left:${mx}px;top:${my}px;`;rx+=(mx-rx)*0.14;ry+=(my-ry)*0.14;curRing.style.cssText+=`left:${rx}px;top:${ry}px;`;requestAnimationFrame(ac);})();

// ═══════════════════════════════════════
// BACKGROUND NEBULA
// ═══════════════════════════════════════
(()=>{
  const c=document.getElementById('bgCanvas'),x=c.getContext('2d');
  const rs=()=>{c.width=innerWidth;c.height=innerHeight;};rs();
  window.addEventListener('resize',rs);
  const blobs=[
    {px:0.12,py:0.28,r:0.28,col:'rgba(94,252,232,0.028)'},
    {px:0.88,py:0.72,r:0.32,col:'rgba(252,94,246,0.028)'},
    {px:0.5, py:0.95,r:0.22,col:'rgba(255,220,90,0.018)'},
    {px:0.72,py:0.08,r:0.25,col:'rgba(94,130,252,0.03)'},
    {px:0.05,py:0.8, r:0.2, col:'rgba(94,252,160,0.018)'},
  ];
  const stars=Array.from({length:260},()=>({
    x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.1,
    a:Math.random()*0.55+0.04,da:(Math.random()-0.5)*0.004,
    hue:Math.random()<0.18?170+Math.random()*90:215+Math.random()*45
  }));
    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════
// PARTS DATA
// ═══════════════════════════════════════
const PARTS=[
  {id:'overview',   name:'Animal Cell',      emoji:'🔬',tag:'The Basic Unit of Life',       color:'#5efce8',
   desc:'Every animal — from a microscopic tardigrade to a blue whale — is built from animal cells. Unlike plant cells, they have no rigid wall, making them flexible and dynamic. Inside this thin membrane lies an entire universe of specialised machinery, all working in concert to keep you alive.',
   fact:'Your body contains ~37 trillion cells. If laid end to end, they would circle Earth over 200 times.',highlight:null},
  {id:'membrane',   name:'Cell Membrane',    emoji:'🛡️',tag:'Selective Barrier · Gatekeeper', color:'#fc5ef6',
   desc:'A phospholipid bilayer just 7–10 nm thick, the cell membrane is far more than a simple wall. Embedded proteins act as gates, pumps, and receptors — constantly monitoring the outside world, letting nutrients in and waste out, and relaying chemical signals to the nucleus.',
   fact:'The membrane is so thin that 10,000 stacked on each other would be the width of a single human hair.',highlight:'membrane'},
  {id:'nucleus',    name:'Nucleus',          emoji:'🧬',tag:'Command Centre · DNA Vault',     color:'#6fa3ff',
   desc:'Enclosed in a double nuclear membrane studded with pores, the nucleus holds your DNA — 2 metres coiled into 46 chromosomes. The nucleolus inside makes ribosomal RNA, launching the entire protein cascade. Nothing happens without the nucleus\'s approval.',
   fact:'If all the DNA in one cell were stretched out, it would reach from Earth to the Sun and back 600 times.',highlight:'nucleus'},
  {id:'mitochondria',name:'Mitochondria',   emoji:'⚡',tag:'Powerhouse · ATP Factory',       color:'#ffb845',
   desc:'Mitochondria are ancient bacteria absorbed 1.5 billion years ago — they still carry their own DNA. Through cellular respiration they convert glucose and oxygen into ATP, the universal energy currency. A single liver cell can contain over 2,000 mitochondria.',
   fact:'Mitochondria reproduce independently inside cells by binary fission — exactly like the bacteria they once were.',highlight:'mitochondria'},
  {id:'er_rough',   name:'Rough ER',         emoji:'🏭',tag:'Protein Factory · Quality Control',color:'#b48eff',
   desc:'Studded with thousands of ribosomes, the Rough ER is a sprawling manufacturing network. Proteins synthesised here are fed into the lumen, folded into precise shapes, quality-checked, and packaged into vesicles for the Golgi apparatus.',
   fact:'The Rough ER is continuous with the nuclear envelope — a direct physical link between DNA and protein production.',highlight:'er_rough'},
  {id:'er_smooth',  name:'Smooth ER',        emoji:'🌊',tag:'Lipid Workshop · Detox Hub',     color:'#5efcd4',
   desc:'Without ribosomes, the Smooth ER looks clean and tubular. It synthesises lipids and steroid hormones, stores calcium ions for muscle contraction, and detoxifies drugs. Liver cells are packed with it — your body\'s chemical processing plant.',
   fact:'Smooth ER in liver cells can increase 3–4× in response to heavy alcohol, ramping up detox capacity.',highlight:'er_smooth'},
  {id:'golgi',      name:'Golgi Apparatus',  emoji:'📬',tag:'Sorting Hub · Dispatch Centre',  color:'#ffd85e',
   desc:'Discovered in 1897, this stack of flattened membranes is the cell\'s postal service. Proteins from the Rough ER get modified, tagged with addresses, and dispatched to exact locations — the membrane, lysosomes, or exported entirely.',
   fact:'The Golgi adds sugar chains to proteins (glycosylation) — critical for cell-to-cell recognition and immunity.',highlight:'golgi'},
  {id:'lysosome',   name:'Lysosomes',        emoji:'☣️',tag:'Recycler · Defence Squad',       color:'#ff5e7e',
   desc:'These acidic spheres (pH ~4.8) carry 60+ digestive enzymes. They destroy invading bacteria, recycle worn-out organelles through autophagy, and break down debris. When a cell is damaged beyond repair, lysosomes trigger programmed death.',
   fact:'Missing a single lysosomal enzyme causes toxic buildup — the root of Tay-Sachs and other storage diseases.',highlight:'lysosome'},
  {id:'ribosome',   name:'Ribosomes',        emoji:'⚙️',tag:'Protein Builders · Nano-machines',color:'#5efca0',
   desc:'The cell\'s most numerous organelle, ribosomes are molecular machines of RNA and protein. They read mRNA instructions and assemble amino acids into proteins at ~200 per minute. Every enzyme and hormone in your body was made by one.',
   fact:'A rapidly dividing cell can hold 10 million ribosomes, producing millions of proteins per second.',highlight:'ribosome'},
  {id:'vacuole',    name:'Vacuoles',         emoji:'💧',tag:'Storage · Osmotic Regulator',     color:'#5eb8fc',
   desc:'Animal cell vacuoles are small and numerous. They store water, nutrients, ions, and waste. They also drive endocytosis — engulfing external material — and exocytosis, expelling substances from the cell.',
   fact:'White blood cells use specialised vacuoles called phagosomes to engulf and destroy bacteria within minutes.',highlight:'vacuole'},
  {id:'centriole',  name:'Centrioles',       emoji:'🔩',tag:'Division Director · Animal-Only', color:'#f05efc',
   desc:'Unique to animal cells, centrioles sit in the centrosome. During division, they organise the mitotic spindle, pulling chromosomes to opposite poles so each daughter cell gets a perfect genome. They also form cilia and flagella.',
   fact:'Each centriole is built from 9 triplet microtubules in a precise cartwheel — one of biology\'s most elegant geometries.',highlight:'centriole'},
  {id:'cytoplasm',  name:'Cytoplasm',        emoji:'🌐',tag:'Cellular Medium · Scaffold',      color:'#a0e0ff',
   desc:'Far from empty space, the cytoplasm is a gel-like medium threaded with a cytoskeleton of microtubules and actin filaments. Glycolysis happens here, organelles glide along cytoskeletal highways, and molecular motors ferry cargo like a nano-scale logistics network.',
   fact:'Cytoplasm is ~70% water but acts as a viscoelastic gel — it can flow like liquid or resist deformation like a solid.',highlight:'cytoplasm'},
];

// ═══════════════════════════════════════
// CANVAS & STATE
// ═══════════════════════════════════════
const canvas=document.getElementById('cellCanvas'),ctx=canvas.getContext('2d');
function calcSize(){const r=document.getElementById('cellStage').getBoundingClientRect();return Math.min(r.width*0.9,r.height*0.9,600);}
let SIZE=calcSize();canvas.width=SIZE;canvas.height=SIZE;
const CX=()=>canvas.width/2,CY=()=>canvas.height/2;
let CELL_R=SIZE*0.40;

function getPos(S){
  const cx=S/2,cy=S/2;
  return{nucleus:{x:cx,y:cy-8},
    mitochondria:[{x:cx-118,y:cy-65},{x:cx+95,y:cy+72},{x:cx-72,y:cy+118}],
    er_rough:{x:cx+75,y:cy-72},er_smooth:{x:cx-88,y:cy+28},
    golgi:{x:cx+55,y:cy+68},

let POS=getPos(SIZE);
function scatterRib(S){const p=[],cx=S/2,cy=S/2,R=S*0.38;let at=0;while(p.length<28&&at<500){at++;const a=Math.random()*Math.PI*2,r=Math.random()*R*0.75+R*0.08,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;const d=x-cx,e=y-(cy-8);if(Math.sqrt(d*d+e*e)<S*0.16)continue;p.push({x,y});}return p;}

function hf(id){return highlightId===id?hlAlpha:0;}
function sg(col,blur){ctx.shadowColor=col;ctx.shadowBlur=blur;}
function cg(){ctx.shadowBlur=0;}

function cellPath(ox,oy){
  const cx2=CX()+ox,cy2=CY()+oy,pts=64;
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
    const a=(i/pts)*Math.PI*2;
    const w=1+0.018*Math.sin(a*3+t*0.017)+0.012*Math.cos(a*5+t*0.011)+0.007*Math.sin(a*7+t*0.008);
    const rx=CELL_R*w,ry=CELL_R*0.92*w;
    const x=cx2+Math.cos(a)*rx,y=cy2+Math.sin(a)*ry;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
}

function drawCytoplasm(h){
  const ox=cellOX,oy=cellOY;ctx.save();
  cellPath(ox,oy);
  const g=ctx.createRadialGradient(CX()+ox,CY()-35+oy,5,CX()+ox,CY()+oy,CELL_R);
  g.addColorStop(0,`rgba(18,34,75,${0.78+h*0.1})`);
  g.addColorStop(0.55,`rgba(9,20,52,0.85)`);
  g.addColorStop(1,`rgba(3,8,28,0.92)`);
  ctx.fillStyle=g;
  if(h>0){ctx.shadowColor='rgba(160,224,255,0.35)';ctx.shadowBlur=40;}
  ctx.fill();ctx.restore();
}
function drawMembrane(h){
  const ox=cellOX,oy=cellOY;ctx.save();
  cellPath(ox,oy);
  const g2=ctx.createRadialGradient(CX()+ox,CY()+oy,CELL_R*0.8,CX()+ox,CY()+oy,CELL_R*1.1);
  g2.addColorStop(0,'transparent');
  g2.addColorStop(0.6,`rgba(252,94,246,${0.05+h*0.1})`);
  g2.addColorStop(1,`rgba(252,94,246,${0.14+h*0.18})`);
  ctx.fillStyle=g2;ctx.fill();
  if(h>0){sg('#fc5ef6',28+h*22);}
  cellPath(ox,oy);
  ctx.strokeStyle=`rgba(252,94,246,${0.32+h*0.58})`;ctx.lineWidth=2+h*3.5;ctx.stroke();
  if(h>0.3){
    for(let i=0;i<56;i++){
      const a=(i/56)*Math.PI*2,w=1+0.018*Math.sin(a*3+t*0.017);
      const r2=CELL_R*w*1.003;
      const px2=CX()+ox+Math.cos(a)*r2,py2=CY()+oy+Math.sin(a)*r2*0.92;
      ctx.beginPath();ctx.arc(px2,py2,2.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(252,94,246,${h*0.55})`;ctx.fill();
    }
  }
  cg();ctx.restore();
}
function drawNucleus(h){
  const ox=cellOX,oy=cellOY,p=POS.nucleus,NR=SIZE*0.135;ctx.save();
  if(h>0){sg('#6fa3ff',32+h*28);}
  const ng=ctx.createRadialGradient(p.x+ox,p.y-18+oy,4,p.x+ox,p.y+oy,NR);
  ng.addColorStop(0,`rgba(70,125,255,${0.62+h*0.14})`);
  ng.addColorStop(0.65,`rgba(40,82,225,0.38)`);
  ng.addColorStop(1,`rgba(15,42,145,0.1)`);
  ctx.beginPath();ctx.ellipse(p.x+ox,p.y+oy,NR,NR*0.91,0.15,0,Math.PI*2);
  ctx.fillStyle=ng;ctx.fill();
  ctx.strokeStyle=`rgba(110,165,255,${0.45+h*0.48})`;ctx.lineWidth=2+h*2.5;ctx.stroke();cg();
  for(let i=0;i<7;i++){
    const a=(i/7)*Math.PI*2+t*0.003;

    ctx.beginPath();

    ctx.bezierCurveTo(p.x+ox+Math.cos(a+0.6)*r2*0.72,p.y+oy+Math.sin(a+0.6)*r2*0.72,p.x+ox+Math.cos(a+1.1)*r2*0.62,p.y+oy+Math.sin(a+1.1)*r2*0.62,p.x+ox+Math.cos(a+1.6)*r2*0.38,p.y+oy+Math.sin(a+1.6)*r2*0.38);
    ctx.strokeStyle='rgba(140,185,255,0.18)';ctx.lineWidth=2;ctx.stroke();
  }
  const nlg=ctx.createRadialGradient(p.x+ox-7,p.y-7+oy,1,p.x+ox-7,p.y-7+oy,NR*0.33);
  nlg.addColorStop(0,'rgba(225,238,255,0.78)');nlg.addColorStop(1,'rgba(80,135,255,0.12)');
  ctx.beginPath();ctx.arc(p.x-7+ox,p.y-7+oy,NR*0.33,0,Math.PI*2);ctx.fillStyle=nlg;ctx.fill();
  ctx.strokeStyle='rgba(185,212,255,0.32)';ctx.lineWidth=1;ctx.stroke();
  for(let i=0;i<10;i++){
    const a=(i/10)*Math.PI*2+t*0.005;
    const px2=p.x+ox+Math.cos(a)*NR*0.96,py2=p.y+oy+Math.sin(a)*NR*0.88;
    ctx.beginPath();ctx.arc(px2,py2,3.2,0,Math.PI*2);

    ctx.beginPath();ctx.arc(px2,py2,5.5,0,Math.PI*2);

function drawMitochondria(h){
  const ox=cellOX,oy=cellOY;ctx.save();
  POS.mitochondria.forEach((p,i)=>{
    const wb=t*0.007+i*1.4,mx2=p.x+Math.cos(wb)*5+ox,my2=p.y+Math.sin(wb)*4+oy;
    const ang=wb*0.3,mw=SIZE*0.055,mh=SIZE*0.027;

    mg.addColorStop(1,`rgba(180,60,0,0.1)`);

    ctx.fillStyle=mg;ctx.fill();
    ctx.strokeStyle=`rgba(255,198,58,${0.55+h*0.42})`;ctx.lineWidth=1.5+h;ctx.stroke();cg();
    for(let c=0;c<4;c++){
      const cx3=mx2-mw*0.6+c*(mw*0.4);

function drawERRough(h){

    const y2=p.y+oy-rH*2.5+i*rH,wv=Math.sin(t*0.014+i*0.9)*4;
    ctx.beginPath();ctx.moveTo(p.x+ox-SIZE*0.1,y2);
    ctx.bezierCurveTo(p.x+ox-SIZE*0.03,y2-8+wv,p.x+ox+SIZE*0.03,y2+8-wv,p.x+ox+SIZE*0.1,y2);

    for(let r=0;r<6;r++){
      const rx2=p.x+ox-SIZE*0.1+r*SIZE*0.033+Math.sin(t*0.02+r+i)*2;
      ctx.beginPath();ctx.arc(rx2,y2+(r%2===0?-4:4),SIZE*0.007,0,Math.PI*2);
      ctx.fillStyle=`rgba(94,252,160,${0.7+h*0.25})`;ctx.fill();

function drawGolgi(h){
  const ox=cellOX,oy=cellOY,p=POS.golgi;ctx.save();
  if(h>0){sg('#ffd85e',24+h*18);}
  for(let i=0;i<6;i++){
    const ca=12-i*3.5,y2=p.y+oy-SIZE*0.04+i*SIZE*0.016,wd=SIZE*(0.065-i*0.004);
    ctx.beginPath();ctx.moveTo(p.x+ox-wd,y2);
    ctx.bezierCurveTo(p.x+ox-wd*0.3,y2-ca,p.x+ox+wd*0.3,y2+ca,p.x+ox+wd,y2);

    const vx=p.x+ox+dx+Math.sin(t*0.04)*3,vy=p.y+oy+dy+Math.cos(t*0.04)*2;

function drawLysosomes(h){

function drawRibosomes(h){

function drawVacuoles(h){

function drawCentrioles(h){

const LABEL_INFO={

  nucleus:     {dx:-8,          dy:-SIZE*0.16,  text:'Nucleus'},

  er_rough:    {dx:SIZE*0.17,   dy:-SIZE*0.19,  text:'Rough ER'},
  er_smooth:   {dx:-SIZE*0.285, dy:SIZE*0.04,   text:'Smooth ER'},
  golgi:       {dx:SIZE*0.14,   dy:SIZE*0.175,  text:'Golgi Apparatus'},
  lysosome:    {dx:-SIZE*0.14,  dy:-SIZE*0.27,  text:'Lysosome'},
  ribosome:    {dx:SIZE*0.145,  dy:-SIZE*0.275, text:'Ribosomes'},
  vacuole:     {dx:-SIZE*0.235, dy:-SIZE*0.21,  text:'Vacuole'},
  centriole:   {dx:SIZE*0.06,   dy:-SIZE*0.24,  text:'Centrioles'},
  cytoplasm:   {dx:-SIZE*0.335, dy:SIZE*0.285,  text:'Cytoplasm'},
};
const PCOLORS={};PARTS.forEach(p=>PCOLORS[p.id]=p.color);

function drawLabels(){
  const ox=cellOX,oy=cellOY;ctx.save();
  Object.entries(LABEL_INFO).forEach(([id,info])=>{
    const isHL=highlightId===id,alpha=isHL?1:0.36;
    const lx=CX()+ox+info.dx,ly=CY()+oy+info.dy;
    const color=PCOLORS[id]||'#fff';
    let ox2=0,oy2=0;
    if(id==='membrane'){ox2=Math.cos(-0.5)*CELL_R;oy2=Math.sin(-0.5)*CELL_R*0.92;}
    else if(POS[id]&&!Array.isArray(POS[id])&&POS[id]!==null){ox2=POS[id].x-CX();oy2=POS[id].y-CY();}
    else if(Array.isArray(POS[id])&&POS[id].length){ox2=POS[id][0].x-CX();oy2=POS[id][0].y-CY();}
    // connector
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(CX()+ox+ox2,CY()+oy+oy2);
    const ah=Math.round(alpha*55).toString(16).padStart(2,'0');
    ctx.strokeStyle=`${color}${ah}`;ctx.lineWidth=isHL?1.8:0.8;ctx.setLineDash([3,6]);ctx.stroke();ctx.setLineDash([]);
    // chip
    ctx.font=`${isHL?700:400} ${SIZE*0.022}px 'Syne',sans-serif`;
    const tw=ctx.measureText(info.text).width,pw=tw+18,ph=SIZE*0.038,rx2=lx-pw/2,ry2=ly-ph/2,rad=ph/2;
    ctx.beginPath();ctx.roundRect(rx2,ry2,pw,ph,rad);
    if(isHL){
      if(isHL){sg(color,14);}
      ctx.fillStyle=`${color}25`;ctx.fill();
      ctx.strokeStyle=`${color}cc`;ctx.lineWidth=1.5;ctx.stroke();cg();
    }else{ctx.fillStyle='rgba(4,8,22,0.72)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.09)';ctx.lineWidth=0.8;ctx.stroke();}
    ctx.fillStyle=isHL?color:`rgba(175,192,228,${alpha})`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(info.text,lx,ly);
  });
  ctx.restore();
}

  ff.classList.remove('visible');
  const doUpdate=()=>{
    document.getElementById('cardEmoji').textContent=part.emoji;
    document.getElementById('cardName').textContent=part.name;
    document.getElementById('cardName').style.color=part.color;
    document.getElementById('cardTag').textContent=part.tag;
    document.getElementById('cardDesc').textContent=part.desc;
    document.querySelector('.ffText').textContent=part.fact;
    document.getElementById('cardAccentBar').style.background=`linear-gradient(90deg,${part.color},${part.color}44,transparent)`;
    document.getElementById('cardAccentCorner').style.background=`radial-gradient(circle at top right,${part.color},transparent)`;
    card.style.borderColor=`${part.color}30`;
    document.getElementById('stepNum').textContent=String(currentStep+1).padStart(2,'0');
    document.getElementById('timelineFill').style.width=((currentStep/(PARTS.length-1))*100)+'%';
    updateTicks();updateThumbs();
    document.getElementById('backBtn').disabled=(currentStep===0);
    setTimeout(()=>ff.classList.add('visible'),320);
    // time left display
    document.getElementById('footerRight').textContent=`${Math.ceil(STEP_DUR/60)}s`;
  };
  if(animate){
    card.style.opacity='0';card.style.transform='translateY(14px)';
    card.style.transition='opacity 0.28s,transform 0.28s';
    setTimeout(()=>{doUpdate();card.style.opacity='1';card.style.transform='translateY(0)';},300);
  }else{doUpdate();card.style.opacity='1';card.style.transform='translateY(0)';}
}

// ═══════════════════════════════════════
// STEP CONTROL
// ═══════════════════════════════════════
function goStep(n,emit=true){
  if(n>=PARTS.length)n=0;
  if(n<0)n=PARTS.length-1;
  currentStep=n;stepStartT=t;
  const part=PARTS[n];highlightId=part.highlight;
  if(emit&&part.color)emitParticles(part.color,18);
  updatePanel(part,emit);
}

// ═══════════════════════════════════════
// PAUSE / PLAY
// ═══════════════════════════════════════
function togglePause(){
  isPaused=!isPaused;
  const btn=document.getElementById('pauseBtn');
  const badge=document.getElementById('pauseBadge');
  if(isPaused){
    btn.textContent='▶';btn.classList.remove('playing');badge.classList.add('visible');
  }else{
    btn.textContent='⏸';btn.classList.add('playing');badge.classList.remove('visible');
    stepStartT=t-Math.round(t-stepStartT);
  }
}

// ═══════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════
function frame(){
  if(!isPaused)t++;
  cellOX=Math.sin(t*0.005)*14+Math.cos(t*0.0083)*6;
  cellOY=Math.cos(t*0.006)*12+Math.sin(t*0.0097)*5;
  hlAlpha=highlightId?(0.62+Math.sin(t*0.065)*0.22):0;
  if(!isPaused){
    const el=t-stepStartT,pr=Math.min(el/STEP_DUR,1);
    updateTimer(pr);
    // update countdown
    const secsLeft=Math.max(0,Math.ceil((STEP_DUR-el)/60));
    document.getElementById('footerRight').textContent=secsLeft+'s';
    if(el>=STEP_DUR)goStep(currentStep+1);
  }
  ctx.clearRect(0,0,SIZE,SIZE);
  drawCytoplasm(hf('cytoplasm'));
  drawMembrane(hf('membrane'));
  drawERSmooth(hf('er_smooth'));
  drawERRough(hf('er_rough'));
  drawVacuoles(hf('vacuole'));
  drawGolgi(hf('golgi'));
  drawMitochondria(hf('mitochondria'));
  drawLysosomes(hf('lysosome'));
  drawRibosomes(hf('ribosome'));
  drawCentrioles(hf('centriole'));
  drawNucleus(hf('nucleus'));
  drawLabels();
  requestAnimationFrame(frame);
}

// ═══════════════════════════════════════
// INIT & EVENTS
// ═══════════════════════════════════════
document.getElementById('stepTotal').textContent=String(PARTS.length).padStart(2,'0');
goStep(0,false);frame();

document.getElementById('nextBtn').addEventListener('click',()=>{if(isPaused)togglePause();goStep(currentStep+1);});
document.getElementById('backBtn').addEventListener('click',()=>{if(currentStep>0){if(isPaused)togglePause();goStep(currentStep-1);}});
document.getElementById('pauseBtn').addEventListener('click',togglePause);

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='l'){if(isPaused)togglePause();goStep(currentStep+1);}
  if(e.key==='ArrowLeft'||e.key==='j'){if(currentStep>0){if(isPaused)togglePause();goStep(currentStep-1);}}
  if(e.key===' '||e.key==='k'){e.preventDefault();togglePause();}
});

window.addEventListener('resize',()=>{
  SIZE=calcSize();canvas.width=SIZE;canvas.height=SIZE;CELL_R=SIZE*0.40;
  POS=getPos(SIZE);POS.ribosome=scatterRib(SIZE);
});
</script>
